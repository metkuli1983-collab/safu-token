<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFU | MANIFESTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #000; color: #fff; font-family: 'VT323', monospace; margin: 0; overflow-x: hidden; }
        #rain-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .drop { position: absolute; color: #ff007f; font-size: 24px; animation: fall linear infinite; opacity: 0.4; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }
        .neon-glow { text-shadow: 0 0 10px #ff007f; }
    </style>
</head>
<body class="p-6">
    <div id="rain-layer"></div>
    <div class="relative z-10 max-w-xl mx-auto">
        <nav class="flex justify-between mb-12 border-b border-[#ff007f]/30 pb-2">
            <a href="index.html" class="text-[#ff007f] font-bold underline italic"><- BACK</a>
            <span class="opacity-50 uppercase text-xs tracking-tighter">MANIFESTO_V1</span>
        </nav>
        <h1 class="text-6xl font-black neon-glow italic uppercase mb-8 underline">The Vision</h1>
        <div class="space-y-6 text-2xl uppercase italic opacity-90 leading-tight">
            <p class="border-l-4 border-[#ff007f] pl-4">The devs are asleep.</p>
            <p>The liquidity is a myth.</p>
            <p>Your portfolio is screaming.</p>
            <p>Welcome to the end of the line.</p>
        </div>
    </div>
    <script>
        const rain = document.getElementById('rain-layer');
        const items = ['👽', '💀', '📉', '💕'];
        setInterval(() => {
            const d = document.createElement('div');
            d.className = 'drop'; d.innerText = items[Math.floor(Math.random()*items.length)];
            d.style.left = Math.random() * 100 + 'vw'; d.style.animationDuration = (Math.random() * 2 + 2) + 's';
            rain.appendChild(d); setTimeout(() => d.remove(), 4000);
        }, 400);
    </script>
</body>
</html>
