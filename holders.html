<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$SAFU | HOLDER_TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="madnesss.css">
</head>
<body class="bg-black text-white font-mono p-4">

    <main class="max-w-4xl mx-auto py-10">
        <div class="flex justify-between items-center border-b border-pink-900 pb-4 mb-10">
            <h1 class="text-2xl font-black italic text-pink-600 tracking-tighter">HOLDER_ZONE</h1>
            <a href="index.html" class="text-[10px] hover:text-pink-500 uppercase">← Return_to_Wall</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="space-y-6">
                <div class="bg-zinc-950 border border-pink-900/50 p-6 shadow-[0_0_20px_rgba(255,0,127,0.05)]">
                    <p class="text-[9px] text-pink-500 mb-2 uppercase tracking-[0.3em]">Identity_Scanner</p>
                    <input type="text" id="wallet-input" placeholder="ENTER_TERRA_ADDR" 
                           class="w-full bg-transparent border-b border-pink-900 py-3 text-sm outline-none focus:border-pink-500 uppercase transition-all">
                    <button id="scan-btn" class="w-full mt-6 py-4 bg-pink-600 text-black font-black uppercase text-xs hover:bg-white transition-all shadow-lg">
                        PROVE_OWNERSHIP
                    </button>
                </div>

                <div id="badge-container" class="hidden animate-in fade-in zoom-in duration-700">
                    </div>
            </div>

            <div class="border-2 border-pink-900 bg-black flex flex-col h-[500px] shadow-[0_0_30px_rgba(0,0,0,1)]">
                <div class="bg-pink-900/10 p-3 border-b border-pink-900 flex justify-between items-center">
                    <span class="text-[10px] font-bold tracking-widest text-pink-500 italic">ORACLE_LINK_ESTABLISHED</span>
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                </div>
                
                <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4 text-[12px] scrollbar-hide">
                    <p class="text-gray-600 italic leading-relaxed">[SYSTEM]: AWAITING IDENTITY SCAN. THE ORACLE DOES NOT SPEAK TO THE UNVERIFIED.</p>
                </div>

                <div class="p-4 border-t border-pink-900 bg-zinc-950">
                    <input type="text" id="chat-input" placeholder="SPEAK_TO_THE_VOID..." 
                           class="bg-transparent w-full outline-none text-pink-500 uppercase text-xs placeholder:text-pink-900">
                </div>
            </div>
        </div>
    </main>

    <script src="holders.js"></script>
</body>
</html>
