<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFU | THE_WALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #050505; color: #ff007f; font-family: 'VT323', monospace; }
        .intel-card { border: 1px solid #ff007f; background: rgba(255, 0, 127, 0.05); transition: all 0.3s; }
        .intel-card:hover { transform: scale(1.02); background: rgba(255, 0, 127, 0.1); border-width: 2px; }
    </style>
</head>
<body class="p-6">

    <nav class="mb-10 uppercase text-xs">
        <a href="index.html" class="border border-[#ff007f] px-3 py-1 hover:bg-[#ff007f] hover:text-black transition-all"><- Back_To_Node</a>
    </nav>

    <h1 class="text-5xl font-black italic mb-2 uppercase underline decoration-double">Wall of Pain</h1>
    <p class="text-xs mb-10 opacity-60 uppercase">Unauthorized Archive // Classified Intel // Do Not Share</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div class="intel-card p-4">
            <div class="bg-black mb-4 border border-[#ff007f]/20 p-2">
                <img src="logo.png" class="w-full grayscale hover:grayscale-0 transition-all duration-500">
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h3 class="font-bold text-lg uppercase leading-none">The_Origin.png</h3>
                    <p class="text-[10px] opacity-50 uppercase">Date: 11_MAY_2026</p>
                </div>
                <div class="text-[10px] border border-[#ff007f] px-1 bg-[#ff007f] text-black font-bold">VERIFIED</div>
            </div>
            <p class="text-[11px] mt-4 leading-tight opacity-80 uppercase italic">
                "The prophecy was written in red candles and broken dreams."
            </p>
        </div>

        <div class="intel-card p-4 flex items-center justify-center border-dashed opacity-30">
            <p class="uppercase text-sm italic">[ Awaiting_Next_Disaster ]</p>
        </div>

    </div>

</body>
</html>
