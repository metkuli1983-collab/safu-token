<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAFU | INTEL_WALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="madness.css">
    <style>
        .meme-card {
            border: 1px solid #333;
            filter: grayscale(100%) contrast(150%);
            transition: all 0.2s ease;
            background: #000;
        }
        .meme-card:active {
            filter: grayscale(0%) contrast(100%);
            border-color: #ff007f;
        }
        .terminal-input {
            caret-color: #ff007f;
            background: transparent;
            border: none;
            outline: none;
            color: #ff007f;
            width: 100%;
            font-family: monospace;
        }
        #terminal-content {
            max-height: 150px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #terminal-content::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#050505] text-zinc-400 p-6 font-mono">

    <nav class="mb-10 flex justify-between items-center text-[9px] uppercase tracking-widest">
        <a href="index.html" class="text-[#ff007f] font-black">[ <- DISCONNECT ]</a>
        <span class="animate-pulse text-green-500">● SECURE_CONNECTION_ESTABLISHED</span>
    </nav>

    <header class="text-center mb-12">
        <h1 class="text-4xl font-black uppercase italic text-white tracking-tighter">Wall of Pain</h1>
        <p class="text-[9px] opacity-30 mt-2 uppercase">Unauthorized Archive // Classified Intel</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-16">
        
        <div class="meme-card aspect-square relative overflow-hidden">
            <img src="https://placehold.co/400x400/000000/333333?text=NO+SIGNAL" class="w-full h-full object-cover opacity-50">
        </div>

        <div class="border-2 border-dashed border-[#ff007f]/30 aspect-square flex flex-col items-center justify-center text-center p-4">
            <div class="text-[#ff007f] text-xl mb-2">📁</div>
            <a href="https://wormhole.app/" target="_blank" class="text-[9px] bg-[#ff007f] text-black px-2 py-1 font-bold uppercase mb-2">Dead Drop</a>
            <p class="text-[7px] uppercase leading-tight opacity-40">Drop file. Copy Link. <br>Submit via Terminal below.</p>
        </div>
    </div>

    <section class="max-w-md mx-auto">
        <div class="bg-black border border-zinc-800 p-4 text-[10px] shadow-2xl">
            <div class="flex gap-1.5 mb-3">
                <div class="w-2 h-2 rounded-full bg-zinc-900 border border-zinc-700"></div>
                <div class="w-2 h-2 rounded-full bg-zinc-900 border border-zinc-700"></div>
                <div class="w-2 h-2 rounded-full bg-zinc-900 border border-zinc-700"></div>
            </div>
            <div id="terminal-content" class="mb-2">
                <p class="text-green-500">> SYSTEM READY.</p>
                <p class="mb-2 text-zinc-500">> TO SUBMIT: PASTE WORMHOLE LINK BELOW.</p>
            </div>
            <div class="flex items-center">
                <span class="text-[#ff007f] mr-2">SAFU@NODE:~$</span>
                <input type="text" class="terminal-input" id="termInput" placeholder="..." spellcheck="false" autocomplete="off">
            </div>
        </div>
    </section>

    <script>
        const input = document.getElementById('termInput');
        const content = document.getElementById('terminal-content');
        
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.toLowerCase().trim();
                const p = document.createElement('p');
                
                // Show what the user typed
                const userLine = document.createElement('p');
                userLine.className = "text-zinc-600";
                userLine.innerText = `> ${val}`;
                content.appendChild(userLine);

                // SECRET TRIGGER: DEV ROOM
                if (val === 'lunc_lives' || val === 'admin' || val === 'root') {
                    p.innerText = ">> ACCESS GRANTED. BYPASSING FIREWALL...";
                    p.className = "text-green-400 font-bold animate-pulse";
                    content.appendChild(p);
                    
                    // Redirect after a small delay for effect
                    setTimeout(() => {
                        window.location.href = 'dev-room.html';
                    }, 1200);
                } 
                // Link Submission Logic
                else if (val.includes('http')) {
                    p.innerText = ">> INTEL RECEIVED. ENCRYPTING FOR UPLOAD...";
                    p.className = "text-[#ff007f] italic";
                    content.appendChild(p);
                } 
                // Help Command
                else if (val === 'help') {
                    p.innerText = ">> COMMANDS: STATUS, CLEAR, [REDACTED_KEY]";
                    p.className = "text-blue-400";
                    content.appendChild(p);
                } 
                // Clear Command
                else if (val === 'clear') {
                    content.innerHTML = '<p class="text-green-500">> SYSTEM RESET.</p>';
                }
                // Fail state
                else {
                    p.innerText = `>> ERROR: '${val}' NOT RECOGNIZED.`;
                    p.className = "text-red-900";
                    content.appendChild(p);
                }
                
                this.value = '';
                // Keep terminal scrolled to bottom
                content.scrollTop = content.scrollHeight;
            }
        });
    </script>

    <script src="shards.js"></script>
</body>
</html>
