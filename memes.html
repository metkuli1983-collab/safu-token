<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$SAFU | THE_WALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="madnesss.css">
    <style>
        /* Cranking the Glow to match Screenshot_20260513-152432.jpg */
        .disaster-glow {
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.9), 0 0 30px rgba(255, 0, 127, 0.4);
        }
        .tape-label {
            background: #ff007f;
            transform: rotate(-3deg);
            box-shadow: 4px 4px 0px white;
        }
        /* The offset button style from the screenshot */
        .btn-offset {
            position: relative;
            background: #ff007f;
            color: white;
            border: 2px solid white;
            box-shadow: 8px 8px 0px 0px white;
            transition: all 0.1s;
        }
        .btn-offset:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px 0px white;
        }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden font-mono">

<nav class="flex justify-between p-4 border-b border-[#ff007f] bg-black sticky top-0 z-[100] text-[9px] uppercase font-bold">
    <div class="text-[#ff007f] animate-pulse">$SAFU_NODE_01</div>
    <div class="flex gap-4">
        <a href="index.html" class="hover:line-through">Home</a>
        <a href="#" class="text-[#ff007f] italic underline">Wall</a>
        <a href="#" class="hover:line-through">Oracle</a>
        <a href="#" class="text-zinc-600">Regret</a>
    </div>
</nav>

<main class="flex flex-col items-center py-20 px-6">
    
    <!-- HEADER: Blown out glow like Screenshot_20260513-152432.jpg -->
    <div class="relative mb-16 text-center">
        <h1 class="font-black text-6xl italic disaster-glow tracking-tighter uppercase mb-2">
            Wall_Of_Echoes
        </h1>
        <div class="tape-label px-6 py-1 inline-block">
            <p class="text-white font-black text-xs tracking-[0.3em] uppercase">
                Memory Leakage Imminent
            </p>
        </div>
    </div>

    <!-- ECHO CARDS: Now using the heavy offset shadow style -->
    <section class="w-full max-w-md space-y-10 mb-20">
        <div class="border-2 border-[#ff007f] p-6 bg-black shadow-[10px_10px_0px_0px_#ff007f] -rotate-1">
            <h2 class="text-2xl font-black text-[#ff007f] italic mb-3">ECHO_01</h2>
            <p class="text-xs tracking-widest text-zinc-300 italic">"THE MEMORY DRIFT IS CONSTANT."</p>
        </div>

        <div class="border-2 border-white p-6 bg-black shadow-[10px_10px_0px_0px_#ff007f] rotate-1">
            <h2 class="text-2xl font-black text-white italic mb-3">ECHO_02</h2>
            <p class="text-xs tracking-widest text-zinc-300 italic">"CAT INTERFERENCE DETECTED IN THE VOID."</p>
        </div>
    </section>

    <!-- TERMINAL: The "Inject Intel" section reimagined -->
    <div class="w-full max-w-sm text-center">
        <p class="text-[10px] text-zinc-500 mb-8 tracking-[0.4em] uppercase">
            Awaiting Neural Injection
        </p>

        <div class="relative group mb-8">
            <input type="text" placeholder="DROP_INTEL_HERE" 
                   class="w-full bg-transparent border-b-2 border-[#ff007f] py-4 text-center text-[#ff007f] outline-none placeholder-[#ff007f]/30 font-black italic uppercase">
        </div>

        <button onclick="submitIntel()" class="btn-offset w-full py-5 text-xl font-black uppercase tracking-tighter">
            Inject_Intel
        </button>

        <p class="mt-12 text-[#ff007f] text-[9px] tracking-widest animate-pulse">
            [ CONNECTION_NEURAL_LINK_STABLE ]
        </p>
    </div>

</main>

<script src="shards.js"></script>
</body>
</html>
