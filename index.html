<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$SAFU | ORIGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #000; color: #fff; font-family: 'VT323', monospace; overflow-x: hidden; }
        .reality-glitch { filter: invert(1) hue-rotate(180deg) !important; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(2px, 2px); } }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.6)); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="flex justify-between p-4 border-b border-[#ff007f] bg-black sticky top-0 z-[100]">
        <div class="text-[#ff007f] animate-pulse">SAFU_NODE_01</div>
        <div class="flex gap-4 uppercase text-xs">
            <a href="index.html" class="underline">Home</a>
            <a href="memes.html" class="underline">The_Wall</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center py-10 px-6 text-center">
        <div class="relative mb-12">
            <img src="logo.png" alt="SAFU" class="w-72 md:w-[450px] logo-glow">
            <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-[#ff007f] text-white font-black px-4 py-1 rotate-2 uppercase text-xl">
                So Absolutely F#ked Up
            </div>
        </div>

        <p class="max-w-xs mb-10 text-xl text-zinc-400 uppercase leading-tight">
            The liquidity is a myth. <br>Your portfolio is a memory.
        </p>

        <div class="flex flex-col gap-4 w-full max-w-xs mb-12">
            <button onclick="alert('ERROR: VALVE_LOCKED_BY_EXTRATERRESTRIALS')" class="bg-[#ff007f] text-white font-black py-4 text-2xl border-4 border-white shadow-[4px_4px_0px_white] active:translate-y-1">
                Buy The Disaster
            </button>
            <button id="wallet-btn" class="border-2 border-[#ff007f] text-[#ff007f] py-2 text-xs uppercase font-bold">
                [ CONNECT_NEURAL_LINK ]
            </button>
        </div>

        <div id="chaos-timer" class="text-5xl font-black text-[#ff007f] tracking-tighter mb-2">000:00:00:00</div>
        <p class="text-[10px] uppercase opacity-40">Time remaining until the void closes.</p>
    </main>

    <div id="alien-popup" class="fixed -bottom-20 -left-20 text-8xl transition-all duration-500 opacity-0 pointer-events-none">👽</div>

    <script>
        // Timer Logic
        const target = new Date("2026-10-31T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('chaos-timer').innerText = `${d}:${h}:${m}:${s}`;
        }, 1000);

        // The Judgemental Alien Logic
        document.getElementById('wallet-btn').addEventListener('click', function() {
            const alien = document.getElementById('alien-popup');
            this.innerText = "> SCANNING_SOUL...";
            document.body.classList.add('reality-glitch');
            alien.style.opacity = "1";
            alien.style.bottom = "10px";
            alien.style.left = "10px";
            alien.style.transform = "scale(5) rotate(15deg)";
            
            setTimeout(() => {
                alert("👽: 'INSUFFICIENT KARMA DETECTED.'");
                document.body.classList.remove('reality-glitch');
                alien.style.opacity = "0";
                this.innerText = "[ ACCESS_DENIED ]";
            }, 2500);
        });
    </script>
</body>
</html>
