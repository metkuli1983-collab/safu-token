<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$SAFU | ORIGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #000; color: #fff; font-family: 'VT323', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* The Rain Effect */
        #rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .rain-drop { position: absolute; color: #ff007f; font-size: 20px; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { to { transform: translateY(100vh); } }

        .logo-img { width: 100%; height: auto; filter: drop-shadow(0 0 25px rgba(255, 0, 127, 0.4)); border-radius: 12px; position: relative; z-index: 10; }
        .reality-glitch { filter: invert(1) hue-rotate(180deg) !important; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(2px, 2px); } }
        
        .nav-link { transition: all 0.2s; }
        .nav-link:hover { color: #ff007f; text-shadow: 0 0 8px #ff007f; }
    </style>
</head>
<body class="flex flex-col min-h-screen relative">

    <div id="rain-container"></div>

    <nav class="flex justify-between items-center px-6 py-5 border-b border-[#ff007f]/30 bg-black/80 backdrop-blur-md sticky top-0 z-[100]">
        <div class="text-[#ff007f] animate-pulse text-xl font-black">SAFU_NODE_01</div>
        <div class="flex gap-6 uppercase text-sm font-bold">
            <a href="index.html" class="nav-link border-b-2 border-[#ff007f]">Home</a>
            <a href="memes.html" class="nav-link">The_Wall</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center py-10 px-4 text-center z-10">
        
        <div class="w-full max-w-[380px] mb-10">
            <img src="logo.png" alt="SAFU" class="logo-img">
        </div>

        <div class="mb-10">
            <p class="text-2xl text-zinc-300 uppercase tracking-tighter italic">"The liquidity is a myth."</p>
            <p class="text-2xl text-zinc-300 uppercase tracking-tighter italic">"Your portfolio is a memory."</p>
        </div>

        <div class="w-full max-w-[300px] space-y-4 mb-12">
            <button onclick="alert('ERROR: VALVE_LOCKED_BY_EXTRATERRESTRIALS')" class="w-full bg-[#ff007f] text-white font-black py-5 text-2xl border-2 border-white shadow-[6px_6px_0px_#ff007f] active:translate-y-1 active:shadow-none transition-all uppercase">
                Buy The Disaster
            </button>
            <button id="wallet-btn" class="w-full border-2 border-[#ff007f] text-[#ff007f] py-3 text-sm uppercase font-bold tracking-[0.2em] bg-black/50 active:bg-[#ff007f] active:text-black transition-all">
                [ CONNECT_NEURAL_LINK ]
            </button>
        </div>

        <div class="mb-10">
            <div id="chaos-timer" class="text-6xl font-black text-[#ff007f] tracking-tighter mb-1 drop-shadow-lg">000:00:00:00</div>
            <p class="text-[10px] uppercase opacity-60 tracking-[0.3em]">Time until the dimension collapses.</p>
        </div>
    </main>

    <footer class="mt-auto border-t border-[#ff007f]/30 p-8 bg-black/90 z-10 text-center">
        <div class="mb-4">
            <p class="text-[10px] text-zinc-500 uppercase mb-2 font-bold tracking-widest text-zinc-400 italic">Financial Ruin Protocol:</p>
            <p class="text-xs break-all font-mono text-[#ff007f] bg-[#ff007f]/10 p-2 border border-[#ff007f]/20 rounded">CA: 0x0000000000000000000000000000000000000000</p>
        </div>
        <p class="text-[9px] opacity-40 uppercase max-w-xs mx-auto">
            Not a investment. Not a coin. Just a ticking clock in a dark room. 👽
        </p>
    </footer>

    <div id="alien-popup" class="fixed -bottom-60 -left-60 text-9xl transition-all duration-500 opacity-0 pointer-events-none z-[200]">👽</div>

    <script>
        // Raining Items Logic
        const rainContainer = document.getElementById('rain-container');
        const items = ['👽', '💕', '💀', '📉'];
        function createRain() {
            const drop = document.createElement('div');
            drop.classList.add('rain-drop');
            drop.innerText = items[Math.floor(Math.random() * items.length)];
            drop.style.left = Math.random() * 100 + "vw";
            drop.style.animationDuration = Math.random() * 2 + 3 + "s";
            rainContainer.appendChild(drop);
            setTimeout(() => drop.remove(), 5000);
        }
        setInterval(createRain, 300);

        // Timer Logic
        const target = new Date("2026-10-31T00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / 86400000).toString().padStart(3, '0');
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('chaos-timer').innerText = `${d}:${h}:${m}:${s}`;
        }, 1000);

        document.getElementById('wallet-btn').addEventListener('click', function() {
            const alien = document.getElementById('alien-popup');
            this.innerText = "> SCANNING_SOUL...";
            document.body.classList.add('reality-glitch');
            alien.style.opacity = "1";
            alien.style.transform = "scale(5) rotate(20deg) translate(25%, -25%)";
            setTimeout(() => {
                alert("👽: 'INSUFFICIENT KARMA DETECTED.'");
                document.body.classList.remove('reality-glitch');
                alien.style.opacity = "0";
                this.innerText = "[ ACCESS_DENIED ]";
            }, 2000);
        });
    </script>
</body>
</html>
