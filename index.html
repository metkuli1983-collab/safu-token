<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$SAFU | ORIGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #000; color: #fff; font-family: VT323, monospace; margin: 0; overflow-x: hidden; min-height: 100vh; }
        
        /* RESTORED RAIN */
        #rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .drop { position: absolute; color: #ff007f; font-size: 24px; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-5vh); } to { transform: translateY(105vh); } }

        .content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .glitch-text { text-shadow: 2px 2px #ff007f; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="rain"></div>

    <div class="content">
        <nav class="w-full flex justify-between mb-10 border-b border-[#ff007f]/50 pb-4">
            <span class="text-[#ff007f]">NODE_01</span>
            <div class="flex gap-4">
                <a href="index.html" class="underline">HOME</a>
                <a href="memes.html" class="text-[#ff007f]">WALL</a>
            </div>
        </nav>

        <div class="mb-6">
            <img src="logo.png" onerror="this.style.display='none'" class="w-64 md:w-80 mb-4 rounded-lg shadow-2xl">
            <h1 class="text-6xl font-black italic glitch-text tracking-tighter">$SAFU</h1>
        </div>

        <p class="text-xl text-zinc-400 mb-8 uppercase italic">"Liquidating Reality."</p>

        <div class="bg-zinc-900 border border-[#ff007f] p-4 w-full max-w-xs mb-8">
            <p class="text-[10px] mb-2 uppercase">Regret_Scanner.v1</p>
            <input type="number" id="amt" placeholder="Tokens..." class="w-full bg-black border border-[#ff007f] p-2 text-[#ff007f] mb-2 text-center outline-none">
            <button onclick="calc()" class="w-full bg-[#ff007f] text-black font-bold py-1 uppercase text-xs">Analyze Damage</button>
            <p id="res" class="text-[10px] mt-2 uppercase h-4"></p>
        </div>

        <div id="timer" class="text-5xl font-black text-[#ff007f] mb-10 tracking-tighter">000:00:00:00</div>

        <footer class="mt-20 opacity-40 text-[10px] uppercase space-y-2">
            <p>Financial Ruin is Guaranteed.</p>
            <p class="bg-zinc-800 p-2 border border-white/10 rounded">CA: Coming_Soon</p>
        </footer>
    </div>

    <script>
        // RAIN LOGIC
        const rain = document.getElementById('rain');
        const chars = ['👽', '💀', '📉', '💕'];
        setInterval(() => {
            const d = document.createElement('div');
            d.className = 'drop';
            d.innerText = chars[Math.floor(Math.random()*chars.length)];
            d.style.left = Math.random() * 100 + 'vw';
            d.style.animationDuration = (Math.random() * 2 + 2) + 's';
            rain.appendChild(d);
            setTimeout(() => d.remove(), 4000);
        }, 300);

        // TIMER LOGIC
        const end = new Date("October 31, 2026 00:00:00").getTime();
        function update() {
            const now = new Date().getTime();
            const diff = end - now;
            const d = Math.floor(diff / 86400000).toString().padStart(3, '0');
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${d}:${h}:${m}:${s}`;
        }
        setInterval(update, 1000);
        update();

        function calc() {
            const v = document.getElementById('amt').value;
            document.getElementById('res').innerText = v > 0 ? `Potential Loss: $${v * 1} (Stay Poor)` : "";
        }
    </script>
</body>
</html>
