<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$SAFU | NODE_01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #000; color: #fff; font-family: 'VT323', monospace; margin: 0; overflow-x: hidden; }
        #rain-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .drop { position: absolute; color: #ff007f; font-size: 24px; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }
        .neon-glow { text-shadow: 0 0 15px #ff007f; }
        .main-ui { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .buy-btn { background: #ff007f; color: white; border-bottom: 6px solid #b00058; transition: all 0.1s; }
        .buy-btn:active { border-bottom: 2px solid #b00058; transform: translateY(4px); }
    </style>
</head>
<body>
    <div id="rain-layer"></div>
    <div class="main-ui">
        <nav class="w-full flex justify-between items-center mb-16 border-b border-[#ff007f]/30 pb-4">
            <span class="text-[#ff007f] tracking-tighter">SAFU_NODE_01</span>
            <div class="flex gap-6 text-xs uppercase underline">
                <a href="memes.html">WALL_OF_PAIN</a>
            </div>
        </nav>
        <div class="text-center mb-12">
            <h1 class="text-8xl font-black neon-glow italic tracking-tighter leading-none mb-4">SAFU</h1>
            <div class="bg-[#ff007f] text-white text-xl font-bold px-6 py-1 rotate-[-2deg] inline-block uppercase shadow-lg">So Absolutely F#ked Up</div>
        </div>
        <div class="space-y-2 mb-12 text-center opacity-80 uppercase italic text-2xl tracking-tighter">
            <p>The liquidity is a myth.</p>
            <p>Your portfolio is a memory.</p>
        </div>
        <div class="w-full max-w-xs space-y-8">
            <button class="buy-btn w-full font-black py-6 text-3xl uppercase italic shadow-2xl">Buy The Disaster</button>
            <div class="border-2 border-[#ff007f] p-4 bg-black/90">
                <p class="text-xs mb-3 uppercase text-[#ff007f] font-bold tracking-[0.2em] text-center underline">Regret_Scanner.v1</p>
                <div class="flex gap-2">
                    <input type="number" id="regret-in" placeholder="Tokens..." class="w-full bg-zinc-900 border border-[#ff007f] p-2 text-[#ff007f] outline-none text-xl">
                    <button onclick="scan()" class="bg-[#ff007f] text-black px-4 font-black uppercase">SCAN</button>
                </div>
                <p id="regret-out" class="text-[10px] mt-3 text-center uppercase font-bold text-white"></p>
            </div>
        </div>
        <div class="mt-auto pb-10 text-center">
            <div id="countdown" class="text-6xl font-black text-[#ff007f] drop-shadow-[0_0_15px_rgba(255,0,127,0.7)]">000:00:00:00</div>
            <p class="text-[10px] opacity-50 uppercase tracking-[0.5em] mt-2">Protocol Stabilization In Progress</p>
        </div>
    </div>
    <script>
        const rain = document.getElementById('rain-layer');
        const chars = ['👽', '💀', '📉', '💕'];
        setInterval(() => {
            const d = document.createElement('div');
            d.className = 'drop'; d.innerText = chars[Math.floor(Math.random()*chars.length)];
            d.style.left = Math.random() * 100 + 'vw'; d.style.animationDuration = (Math.random() * 2 + 2) + 's';
            rain.appendChild(d); setTimeout(() => d.remove(), 4000);
        }, 300);
        const target = new Date("October 31, 2026 00:00:00").getTime();
        function update() {
            const now = new Date().getTime(); const diff = target - now;
            const days = Math.floor(diff / 86400000).toString().padStart(3, '0');
            const hours = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            const mins = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const secs = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('countdown').innerText = `${days}:${hours}:${mins}:${secs}`;
        }
        setInterval(update, 1000); update();
        function scan() {
            const val = document.getElementById('regret-in').value;
            const out = document.getElementById('regret-out');
            if(val > 0) { out.innerText = `>> WARNING: POTENTIAL LOSS OF $${(val*1).toLocaleString()}. YOU ARE ALREADY LIQUIDATED.`; }
        }
    </script>
</body>
</html>
